# Help Screenshot Annotations Configuration
# 
# This file defines annotations (numbered circles with legends) to be
# overlaid on help screenshots. Used by scripts/annotate_screenshots.py
#
# Structure:
#   viewport: [width, height] - Reference viewport size
#   circle_radius: Size of annotation circles in pixels
#   circle_color: Color for annotation circles (hex)
#   text_color: Color for numbers inside circles (hex)
#   screenshots: Dictionary of screenshot paths to annotations
#
# Each screenshot can have multiple annotations with:
#   - x, y: Position of the annotation circle (relative to viewport)
#   - label: Legend text explaining what this annotation points to

viewport: [1280, 720]
circle_radius: 16
circle_color: "#E53935"
text_color: "#FFFFFF"

