<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}pullDB{% endblock %}</title>
    
    <!-- Design System Foundation (HCA shared layer) -->
    <link rel="stylesheet" href="/static/css/shared/design-tokens.css">
    <link rel="stylesheet" href="/static/css/shared/reset.css">
    <link rel="stylesheet" href="/static/css/shared/utilities.css">
    
    <!-- Feature Components (HCA features layer) -->
    <link rel="stylesheet" href="/static/css/features/buttons.css">
    <link rel="stylesheet" href="/static/css/features/forms.css">
    <link rel="stylesheet" href="/static/css/features/alerts.css">
    
    <!-- Page-specific CSS (HCA pages layer) -->
    <link rel="stylesheet" href="/static/css/pages/profile.css">
    
    <!-- Legacy CSS (transitional) -->
    <link rel="stylesheet" href="/static/css/design-system.css">
    <link rel="stylesheet" href="/static/css/dark-mode.css">
    
    <style>
        /* Minimal auth page styles - most moved to profile.css HCA layer */
        /* Auth submit button (legacy - migrate to .btn-primary) */
        .auth-submit {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            padding: var(--space-3) var(--space-6);
            font-size: var(--font-size-base);
            font-weight: 600;
            color: var(--white);
            background: var(--primary-600);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background-color var(--transition-base), transform var(--transition-base);
        }
        .auth-submit:hover { background: var(--primary-700); }
        .auth-submit:active { transform: translateY(1px); }
        .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        /* Password requirements list (specific to forced-reset) */
        .auth-requirements {
            background: var(--gray-50);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            margin-bottom: var(--space-6);
        }
        [data-theme="dark"] .auth-requirements { background: rgba(255, 255, 255, 0.05); }
        .auth-requirements h3 {
            font-size: var(--font-size-xs);
            font-weight: 600;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: var(--space-3);
        }
        [data-theme="dark"] .auth-requirements h3 { color: rgba(255, 255, 255, 0.6); }
        .auth-requirements ul { list-style: none; margin: 0; padding: 0; }
        .auth-requirements li {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            font-size: var(--font-size-sm);
            color: var(--gray-400);
            padding: var(--space-1) 0;
            transition: color var(--transition-base);
        }
        [data-theme="dark"] .auth-requirements li { color: rgba(255, 255, 255, 0.4); }
        .auth-requirements li.valid { color: var(--success-600); }
        [data-theme="dark"] .auth-requirements li.valid { color: #4ade80; }
        .auth-requirements li svg { flex-shrink: 0; }
        
        /* Theme toggle position */
        .auth-theme-toggle { position: fixed; top: var(--space-4); right: var(--space-4); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="auth-body">
    <!-- Theme Toggle -->
    <div class="auth-theme-toggle">
        <button id="theme-toggle" class="btn-icon" aria-label="Toggle dark mode" title="Toggle dark mode">
            <svg data-icon="sun" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2"/><path d="M12 20v2"/>
                <path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/>
                <path d="M2 12h2"/><path d="M20 12h2"/>
                <path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
            </svg>
            <svg data-icon="moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
            </svg>
        </button>
    </div>

    <div class="auth-container">
        {% block content %}{% endblock %}
    </div>

    <script src="/static/js/theme-toggle.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
