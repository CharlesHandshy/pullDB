{% if events %}
<table>
    <thead>
        <tr>
            <th style="width: 180px;">Timestamp</th>
            <th style="width: 120px;">Event Type</th>
            <th>Details</th>
        </tr>
    </thead>
    <tbody>
        {% for event in events %}
        <tr>
            <td class="mono text-sm">{{ event.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</td>
            <td>
                <span class="badge {% if event.event_type == 'error' %}badge-failed{% elif event.event_type == 'complete' %}badge-completed{% elif event.event_type == 'start' %}badge-running{% else %}badge-secondary{% endif %}">
                    {{ event.event_type }}
                </span>
            </td>
            <td>{{ event.detail or '' }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p class="text-muted">No events recorded yet.</p>
{% endif %}
