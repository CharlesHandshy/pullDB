{% extends "base.html" %}

{% block title %}Jobs - pullDB{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', path='widgets/lazy_table/lazy_table.css') }}">
<style>
.tabs {
    display: flex;
    border-bottom: 1px solid var(--gray-200);
}
.tab {
    padding: 0.75rem 1.5rem;
    background: none;
    border: none;
    color: var(--gray-600);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    font-weight: 500;
    cursor: pointer;
    font-size: inherit;
    font-family: inherit;
}
.tab:hover {
    color: var(--gray-900);
}
.tab-active {
    color: var(--primary-600);
    border-bottom-color: var(--primary-600);
}
</style>
{% endblock %}

{% block content %}
<div class="jobs-page">
    <div class="page-header">
        <h1 class="page-title">Jobs</h1>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <a href="/web/restore" class="btn btn-primary">New Restore Job</a>
        </div>
    </div>

    <!-- View Toggle Tabs -->
    <div class="tabs" style="margin-bottom: var(--space-4);">
        <button type="button" class="tab {% if view != 'history' %}tab-active{% endif %}" data-view="active" id="tab-active">
            Active Jobs
        </button>
        <button type="button" class="tab {% if view == 'history' %}tab-active{% endif %}" data-view="history" id="tab-history">
            History
        </button>
    </div>

    <!-- LazyTable Container -->
    <div class="card" style="height: calc(100vh - 280px); min-height: 400px;">
        <div id="jobs-table-container" style="height: 100%;"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', path='widgets/lazy_table/lazy_table.js') }}?v=3"></script>
<script>
(function() {
    let currentView = '{{ view or "active" }}';
    
    const columns = [
        { 
            key: 'id', 
            label: 'Job ID', 
            sortable: true, 
            filterable: true,
            filterType: 'text',
            filterPlaceholder: 'job-01* or *0100',
            width: '125px',
            render: (val, row) => {
                const link = '<a href="/web/jobs/' + val + '" class="font-mono" style="color: var(--primary-600);">' + (val || '').substring(0, 8) + '</a>';
                const canCancel = row.can_cancel && ['queued', 'running'].includes(row.status) && !row.cancel_requested_at;
                if (canCancel) {
                    return '<span style="display: flex; align-items: center; gap: 6px;">' + link + 
                        '<button class="cancel-job-btn" data-job-id="' + val + '" title="Cancel Job" style="display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; padding: 0; background: var(--danger-50); color: var(--danger-600); border: 1px solid var(--danger-200); border-radius: 4px; cursor: pointer;"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="width:12px;height:12px;"><path fill-rule="evenodd" d="M4.5 7.5a3 3 0 0 1 3-3h9a3 3 0 0 1 3 3v9a3 3 0 0 1-3 3h-9a3 3 0 0 1-3-3v-9Z" clip-rule="evenodd"/></svg></button></span>';
                }
                return link;
            }
        },
        { 
            key: 'target', 
            label: 'Target', 
            sortable: true, 
            filterable: true
        },
        { 
            key: 'owner_user_code', 
            label: 'User', 
            sortable: true, 
            filterable: true, 
            width: '95px',
            render: (val) => '<span class="font-mono" style="font-size: 0.85em;">' + (val || '-') + '</span>'
        },
        { 
            key: 'status', 
            label: 'Status', 
            sortable: true, 
            filterable: true, 
            width: '110px',
            render: (val, row) => {
                const classes = {
                    'complete': 'badge-success',
                    'failed': 'badge-danger',
                    'running': 'badge-primary',
                    'queued': 'badge-neutral',
                    'canceled': 'badge-neutral'
                };
                let cls = classes[val] || 'badge-neutral';
                let style = '';
                
                // If running with cancel requested, show strikethrough + red
                if (val === 'running' && row.cancel_requested_at) {
                    style = 'text-decoration: line-through; background-color: var(--danger-100); color: var(--danger-700); border-color: var(--danger-200);';
                }
                
                return '<span class="badge ' + cls + '" style="' + style + '">' + val + '</span>';
            }
        },
        { 
            key: 'submitted_at', 
            label: 'Date', 
            sortable: true, 
            filterable: true,
            filterType: 'dateRange',
            width: '100px',
            render: (val) => {
                if (!val) return '-';
                const d = new Date(val);
                const now = new Date();
                return d.getFullYear() === now.getFullYear() ? (d.getMonth()+1) + '/' + d.getDate() : d.toLocaleDateString();
            }
        },
        { 
            key: 'dbhost', 
            label: 'Host', 
            sortable: true, 
            filterable: true,
            render: (val) => val ? val.split('.')[0] : '-'
        }
    ];
    
    // Compute role-based default filters
    const userRole = '{{ user.role.value }}';
    const userCode = '{{ user.user_code }}';
    const managedUserCodes = {{ managed_user_codes | tojson }};
    const threeDaysAgoIso = '{{ three_days_ago_iso }}';
    
    // Default filters based on role:
    // - Admin: no default filters (can use column filters to narrow down)
    // - Manager: filter to their users + self
    // - User: filter to only self
    let defaultFilters = {};
    if (userRole === 'admin') {
        // Admin sees all jobs - can use visible Submitted column filter if needed
        defaultFilters = {};
    } else if (userRole === 'manager' && managedUserCodes.length > 0) {
        defaultFilters = { owner_user_code: managedUserCodes };
    } else {
        defaultFilters = { owner_user_code: [userCode] };
    }
    
    // =========================================================================
    // Navigation Intent & Initial State
    // =========================================================================
    // Priority: 1) NavIntent (sessionStorage) 2) URL params (fallback for external links)
    // Both are consumed immediately to prevent persistence on tab switches
    
    let intentFilters = {};
    let intentView = null;
    
    // 1. Check NavIntent (from dashboard links)
    const navIntent = NavIntent.consume();
    if (navIntent) {
        intentView = navIntent.view || null;
        intentFilters = navIntent.filters || {};
    }
    
    // 2. Fallback: Check URL params (for external deep-links, e.g., from email)
    const urlParams = new URLSearchParams(window.location.search);
    if (!navIntent) {
        const filterParamMap = {
            'filter_status': 'status',
            'status': 'status',
            'filter_user_code': 'owner_user_code',
            'filter_target': 'target',
            'filter_dbhost': 'dbhost',
            'filter_id': 'id'
        };
        
        for (const [param, filterKey] of Object.entries(filterParamMap)) {
            const value = urlParams.get(param);
            if (value) {
                intentFilters[filterKey] = [value];
            }
        }
        
        // Clear filter params from URL after consuming (keep only 'view')
        if (Object.keys(intentFilters).length > 0) {
            const cleanUrl = new URL(window.location);
            Object.keys(filterParamMap).forEach(param => cleanUrl.searchParams.delete(param));
            history.replaceState({}, '', cleanUrl);
        }
    }
    
    // Determine initial view: NavIntent > URL param > default from template
    const urlView = urlParams.get('view');
    currentView = intentView || urlView || currentView;
    
    // Set initial tab as active
    document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('tab-active', t.dataset.view === currentView);
    });
    
    // =========================================================================
    // Filter Logic
    // =========================================================================
    
    // Helper: get default filters for a given view (no intent logic here)
    const getDefaultFiltersForView = (view) => {
        let filters = { ...defaultFilters };
        
        // History view: remove date filter - users want to see all history
        if (view === 'history') {
            delete filters.submitted_at;
        }
        
        return filters;
    };
    
    // Initial filters: merge defaults with intent filters
    const initialFilters = { ...getDefaultFiltersForView(currentView), ...intentFilters };
    
    const table = new LazyTable({
        container: document.getElementById('jobs-table-container'),
        columns: columns,
        fetchUrl: '/api/jobs/paginated?view=' + currentView,
        rowHeight: 52,
        rowIdKey: 'id',
        emptyMessage: 'No jobs found.',
        initialFilters: initialFilters
    });
    
    // Store reference globally for debugging
    window.jobsTable = table;
    
    // Cancel button click handler (delegated)
    document.addEventListener('click', (e) => {
        const btn = e.target.closest('.cancel-job-btn');
        if (btn) {
            e.preventDefault();
            e.stopPropagation();
            const jobId = btn.dataset.jobId;
            if (confirm('Are you sure you want to cancel this job?')) {
                fetch('/web/jobs/' + jobId + '/cancel', { method: 'POST', credentials: 'same-origin' })
                    .then(() => window.jobsTable.refresh());
            }
        }
    });
    
    // Per-tab state persistence (in-memory)
    const viewStates = {};
    
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', function() {
            // Save current tab's state before switching
            viewStates[currentView] = table.getState();
            
            // Update tab styles
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active'));
            this.classList.add('tab-active');
            
            // Update view
            currentView = this.dataset.view;
            
            // Restore saved state for new tab, or apply defaults if first visit
            if (viewStates[currentView]) {
                // User already visited this tab - restore their exact state
                table.setState(viewStates[currentView]);
            } else {
                // First visit to this tab - apply default filters (no intent/URL filters)
                table.setState({ 
                    columnFilters: getDefaultFiltersForView(currentView), 
                    sortColumn: null, 
                    sortDirection: null 
                });
            }
            
            // Refresh with new URL
            table.setFetchUrl('/api/jobs/paginated?view=' + currentView);
            
            // Update URL - only set view param, remove any stale filter params
            const url = new URL(window.location);
            url.search = ''; // Clear all params
            url.searchParams.set('view', currentView);
            history.pushState({}, '', url);
        });
    });
})();
</script>
{% endblock %}
