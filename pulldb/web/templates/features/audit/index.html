{% extends "base.html" %}

{% block title %}Audit Logs - Admin - pullDB{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', path='css/pages/admin.css') }}">
<link rel="stylesheet" href="{{ url_for('static', path='widgets/lazy_table/lazy_table.css') }}">
{% endblock %}

{% block content %}
<div class="audit-page">
    <!-- Page Header with Stats -->
    <div class="page-header-row mb-4">
        <div class="page-header-left">
            <h1 class="page-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-sm">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" x2="8" y1="13" y2="13"/>
                    <line x1="16" x2="8" y1="17" y2="17"/>
                    <line x1="10" x2="8" y1="9" y2="9"/>
                </svg>
                Audit Logs
            </h1>
        </div>
        <div class="status-bar">
            <span class="status-item" title="Total Records">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                    <polyline points="14 2 14 8 20 8"/>
                </svg>
                <span class="status-count" id="stat-total">{{ stats.total }}</span>
            </span>
            <span class="status-divider"></span>
            <span class="status-item status-enabled" title="User Actions">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span class="status-count" id="stat-user-actions">{{ stats.user_actions }}</span>
            </span>
            <span class="status-item status-manager" title="System Actions">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                <span class="status-count" id="stat-system-actions">{{ stats.system_actions }}</span>
            </span>
            <span class="status-divider"></span>
            <span class="status-item" title="Filtered Results">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
                </svg>
                <span class="status-count" id="stat-filtered">-</span>
            </span>
        </div>
    </div>

    <!-- Audit Card with LazyTable -->
    <div class="card lazy-table-height-viewport">
        <div id="audit-table-container" class="h-full"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', path='widgets/lazy_table/lazy_table.js') }}?v=8"></script>
<script>
(function() {
    'use strict';

    const container = document.getElementById('audit-table-container');
    if (!container) {
        console.error('[audit] Container not found');
        return;
    }

    // User icon SVG for actor avatar rendering (matches users page pattern)
    const userIconSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';

    // ==========================================================================
    // Column Renderers
    // ==========================================================================

    const formatTime = (val) => {
        if (!val) return '-';
        const d = new Date(val);
        const date = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
        const time = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
        return `<span class="cell-nowrap">${date} ${time}</span>`;
    };

    const renderActor = (val, row) => {
        const username = val || '(system)';
        const isSystem = !row.actor_user_id;
        const iconClass = isSystem ? ' system' : '';
        return `<span class="user-cell"><div class="user-icon-sm${iconClass}">${userIconSvg}</div><span class="user-name">${username}</span></span>`;
    };

    const renderAction = (val) => {
        if (!val) return '-';
        let badgeClass = '';
        if (val.includes('create') || val.includes('add')) badgeClass = 'create';
        else if (val.includes('update') || val.includes('change')) badgeClass = 'update';
        else if (val.includes('delete') || val.includes('remove')) badgeClass = 'delete';
        else if (val.includes('cancel')) badgeClass = 'cancel';
        else if (val.includes('submit')) badgeClass = 'submit';
        else if (val.includes('password') || val.includes('reset')) badgeClass = 'password';
        else if (val.includes('setting')) badgeClass = 'setting';
        else if (val.includes('login') || val.includes('logout')) badgeClass = 'login';
        return `<span class="action-badge ${badgeClass}">${val}</span>`;
    };

    const renderTarget = (val, row) => {
        if (!val || val === '-') return '<span class="cell-empty">-</span>';
        return `<span class="user-cell"><div class="user-icon-sm">${userIconSvg}</div><span class="user-name">${val}</span></span>`;
    };

    const renderDetail = (val, row) => {
        if (!val || val === '-') return '<span class="cell-empty">-</span>';
        
        // If there's context data, show it as a tooltip
        let contextHtml = '';
        if (row.context && row.context.trim()) {
            const escapedContext = row.context.replace(/"/g, '&quot;').replace(/\n/g, '&#10;');
            contextHtml = ` <span class="detail-context-icon" title="${escapedContext}">ⓘ</span>`;
        }
        
        return `<span class="detail-cell" title="${val}">${val}${contextHtml}</span>`;
    };

    // ==========================================================================
    // Column Definitions
    // ==========================================================================

    const columns = [
        { 
            key: 'created_at', 
            label: 'Time', 
            sortable: true,
            filterable: true,
            filterType: 'dateRange',
            width: '140px',
            render: formatTime
        },
        { 
            key: 'actor_username', 
            label: 'Actor', 
            sortable: true,
            filterable: true,
            width: '160px',
            render: renderActor
        },
        { 
            key: 'action', 
            label: 'Action', 
            sortable: true,
            filterable: true,
            width: '180px',
            render: renderAction
        },
        { 
            key: 'target_username', 
            label: 'Target', 
            sortable: true,
            filterable: true,
            width: '160px',
            render: renderTarget
        },
        { 
            key: 'detail', 
            label: 'Detail', 
            sortable: false,
            render: renderDetail
        }
    ];

    // ==========================================================================
    // Stats Update
    // ==========================================================================

    function updateStats(data) {
        if (data.stats) {
            document.getElementById('stat-total').textContent = data.stats.total;
            document.getElementById('stat-user-actions').textContent = data.stats.user_actions;
            document.getElementById('stat-system-actions').textContent = data.stats.system_actions;
        }
        if (data.filteredCount !== undefined) {
            document.getElementById('stat-filtered').textContent = data.filteredCount;
        }
    }

    // ==========================================================================
    // LazyTable Initialization
    // ==========================================================================

    const table = new LazyTable({
        container: container,
        columns: columns,
        fetchUrl: '/web/admin/audit/api/logs',
        rowHeight: 48,
        rowIdKey: 'audit_id',
        emptyMessage: 'No audit logs found',
        onDataLoaded: updateStats
    });

    window.auditTable = table;
})();
</script>
{% endblock %}
