{% extends "base_auth.html" %}
{% from "partials/icons/_index.html" import icon %}

{% block title %}Login - pullDB{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-header">
        <div class="auth-icon">
            {{ icon('lock', size='32') }}
        </div>
        <h1>Login to pullDB</h1>
    </div>

    {% if error %}
    <div class="auth-error">
        {{ icon('x-circle', size='18') }}
        <span>{{ error }}</span>
    </div>
    {% endif %}

    <form method="post" action="/web/login" class="auth-form">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>

        <button type="submit" class="auth-submit">
            {{ icon('login', size='18') }}
            Sign In
        </button>
    </form>
</div>
{% endblock %}
