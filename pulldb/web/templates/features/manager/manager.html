{% extends "base.html" %}

{% block title %}Manager Dashboard - pullDB{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', path='css/pages/admin.css') }}">
<link rel="stylesheet" href="{{ url_for('static', path='widgets/lazy_table/lazy_table.css') }}">
{% endblock %}

{% block content %}
<div class="manager-page">
    <!-- Team Card with LazyTable -->
    <div class="card">
        <div class="card-header">
            <div class="card-header-left">
                <h3 class="card-title">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-sm">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    My Team
                </h3>
            </div>
            <div class="status-bar">
                <span class="status-item" title="Team Members">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    <span class="status-count" id="stat-members">{{ stats.managed_users }}</span>
                </span>
                <span class="status-divider"></span>
                <span class="status-item status-enabled" title="Active Members">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                    <span class="status-count" id="stat-active">{{ stats.active_users }}</span>
                </span>
                <span class="status-divider"></span>
                <span class="status-item status-active" title="Team Active Jobs">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                        <polyline points="21 3 21 9 15 9"/>
                    </svg>
                    <span class="status-count" id="stat-jobs">{{ stats.my_team_active_jobs }}</span>
                </span>
            </div>
        </div>
        <div class="card-body no-padding">
            <div id="team-table-container"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', path='widgets/lazy_table/lazy_table.js') }}?v=7"></script>
<script src="{{ url_for('static', path='js/pages/manager-dashboard.js') }}?v=2"></script>
{% endblock %}
