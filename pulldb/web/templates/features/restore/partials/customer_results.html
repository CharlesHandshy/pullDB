{% if results %}
<div class="customer-results-list">
    {% for result in results %}
    <button type="button" 
            class="customer-result-item" 
            onclick="selectCustomer('{{ result.value }}')">
        <div class="customer-result-label">{{ result.label }}</div>
        {% if result.sublabel %}
        <div class="customer-result-sublabel">{{ result.sublabel }}</div>
        {% endif %}
    </button>
    {% endfor %}
</div>
{% else %}
<div class="customer-results-empty">No customers found</div>
{% endif %}
