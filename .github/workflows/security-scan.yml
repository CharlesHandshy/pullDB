name: Security Scan

on:
  # Weekly scan every Monday at 9 AM UTC
  schedule:
    - cron: '0 9 * * 1'

  # Run on pull requests that modify dependencies
  pull_request:
    paths:
      - 'requirements-test.txt'
      - 'scripts/setup_test_env.sh'
      - '.github/workflows/security-scan.yml'

  # Manual trigger for ad-hoc scans
  workflow_dispatch:

  # Run on pushes to main/pulldb branches
  push:
    branches: [ main, pulldb ]
    paths:
      - 'requirements-test.txt'

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # For GitHub Security tab integration

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit on requirements-test.txt
        id: audit
        run: |
          echo "## Dependency Vulnerability Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Python Version:** $(python --version)" >> $GITHUB_STEP_SUMMARY
          echo "**pip-audit Version:** $(pip-audit --version)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Run audit and capture exit code
          set +e
          pip-audit --requirement requirements-test.txt \
            --desc \
            --format json \
            --output audit-report.json
          AUDIT_EXIT_CODE=$?
          set -e

          # Generate human-readable output
          pip-audit --requirement requirements-test.txt --desc || true

          if [ $AUDIT_EXIT_CODE -eq 0 ]; then
            echo "✅ **No vulnerabilities found**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All dependencies in requirements-test.txt are secure." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Vulnerabilities detected**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "See detailed report below. Review and update dependencies as needed." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Download the audit-report.json artifact for full details." >> $GITHUB_STEP_SUMMARY
          fi

          exit $AUDIT_EXIT_CODE

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report-${{ github.run_id }}
          path: audit-report.json
          retention-days: 90

      - name: Notify on failure
        if: failure() && github.event_name == 'schedule'
        run: |
          echo "::warning::Weekly security scan detected vulnerabilities. Review audit-report.json artifact."
          echo "Run 'pip-audit --requirement requirements-test.txt --fix' locally to generate upgrade recommendations."

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: true
