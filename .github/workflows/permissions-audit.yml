name: permissions-audit

on:
  push:
    branches: [ main, release/* ]
  pull_request:
    branches: [ main, release/* ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal deps (if needed)
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip

      - name: Run CI permissions check
        run: |
          bash scripts/ci-permissions-check.sh

      - name: Fail on drift summary
        if: failure()
        run: |
          echo 'Permission or ownership drift detected. See step logs.'
