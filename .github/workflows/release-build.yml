name: Release Build & Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to upload release assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Sync & Update Submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
          echo "Submodules synchronized and updated recursively."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies from lockfile
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run ruff format check
        run: |
          ruff format --check .

      - name: Run ruff linting
        run: |
          ruff check . --exclude engineering-dna

      - name: Run mypy type checking
        run: |
          mypy . --exclude engineering-dna

      - name: Security scan with pip-audit
        run: |
          pip install pip-audit
          pip-audit --requirement requirements-test.txt --desc --format json --output audit-report.json || true
          pip-audit --requirement requirements-test.txt --desc
        continue-on-error: false

      - name: Run pytest
        run: |
          pytest -q --timeout=60 --timeout-method=thread --ignore=tests/e2e
        env:
          # AWS credentials from GitHub Secrets for test suite
          AWS_PROFILE: ${{ secrets.AWS_PROFILE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          # Test database credentials override (if needed for CI)
          PULLDB_TEST_MYSQL_HOST: ${{ secrets.PULLDB_TEST_MYSQL_HOST }}
          PULLDB_TEST_MYSQL_USER: ${{ secrets.PULLDB_TEST_MYSQL_USER }}
          PULLDB_TEST_MYSQL_PASSWORD: ${{ secrets.PULLDB_TEST_MYSQL_PASSWORD }}
          PULLDB_TEST_MYSQL_DATABASE: ${{ secrets.PULLDB_TEST_MYSQL_DATABASE }}

      - name: Install Playwright for E2E tests
        run: |
          pip install playwright pytest-playwright
          playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          pytest tests/e2e/ -v --timeout=120
        env:
          PULLDB_MODE: SIMULATION

      - name: Extract version from tag
        id: version
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "version=${TAG_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build Debian package
        run: |
          bash scripts/build_deb.sh

      - name: Build Client Debian package
        run: |
          bash scripts/build_client_deb.sh

      - name: Import GPG key
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Sign packages
        if: ${{ secrets.GPG_KEY_ID != '' }}
        run: |
          sudo apt-get update && sudo apt-get install -y dpkg-sig
          SERVER_DEB="pulldb_${{ steps.version.outputs.version }}_amd64.deb"
          CLIENT_DEB="pulldb-client_${{ steps.version.outputs.version }}_amd64.deb"
          dpkg-sig --sign builder -k "$GPG_KEY_ID" "$SERVER_DEB"
          dpkg-sig --sign builder -k "$GPG_KEY_ID" "$CLIENT_DEB"
          echo "Packages signed successfully"
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}

      - name: Generate checksums
        id: checksums
        run: |
          SERVER_DEB="pulldb_${{ steps.version.outputs.version }}_amd64.deb"
          CLIENT_DEB="pulldb-client_${{ steps.version.outputs.version }}_amd64.deb"
          
          if [[ ! -f "$SERVER_DEB" ]]; then
            echo "ERROR: Expected server .deb file not found: $SERVER_DEB"
            exit 1
          fi
          if [[ ! -f "$CLIENT_DEB" ]]; then
            echo "ERROR: Expected client .deb file not found: $CLIENT_DEB"
            exit 1
          fi

          SERVER_SHA256=$(sha256sum "$SERVER_DEB" | awk '{print $1}')
          SERVER_MD5=$(md5sum "$SERVER_DEB" | awk '{print $1}')
          CLIENT_SHA256=$(sha256sum "$CLIENT_DEB" | awk '{print $1}')
          CLIENT_MD5=$(md5sum "$CLIENT_DEB" | awk '{print $1}')

          echo "server_sha256=${SERVER_SHA256}" >> $GITHUB_OUTPUT
          echo "server_md5=${SERVER_MD5}" >> $GITHUB_OUTPUT
          echo "server_filename=${SERVER_DEB}" >> $GITHUB_OUTPUT
          echo "client_sha256=${CLIENT_SHA256}" >> $GITHUB_OUTPUT
          echo "client_md5=${CLIENT_MD5}" >> $GITHUB_OUTPUT
          echo "client_filename=${CLIENT_DEB}" >> $GITHUB_OUTPUT

          echo "### Checksums"
          echo "Server: ${SERVER_DEB}"
          echo "- SHA256: ${SERVER_SHA256}"
          echo "- MD5: ${SERVER_MD5}"
          echo "Client: ${CLIENT_DEB}"
          echo "- SHA256: ${CLIENT_SHA256}"
          echo "- MD5: ${CLIENT_MD5}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.checksums.outputs.server_filename }}
            ${{ steps.checksums.outputs.client_filename }}
          body: |
            ## Checksums

            **${{ steps.checksums.outputs.server_filename }}** (Server)
            - SHA256: `${{ steps.checksums.outputs.server_sha256 }}`
            - MD5: `${{ steps.checksums.outputs.server_md5 }}`

            **${{ steps.checksums.outputs.client_filename }}** (Client CLI)
            - SHA256: `${{ steps.checksums.outputs.client_sha256 }}`
            - MD5: `${{ steps.checksums.outputs.client_md5 }}`

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ steps.version.outputs.tag }}/CHANGELOG.md) for complete release notes.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report success
        run: |
          echo "✅ Release ${{ steps.version.outputs.tag }} built and published successfully"
          echo "📦 Server: ${{ steps.checksums.outputs.server_filename }}"
          echo "📦 Client: ${{ steps.checksums.outputs.client_filename }}"
          echo "🔗 Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}"
