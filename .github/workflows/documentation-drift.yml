# Documentation Drift Detection
# Ensures KNOWLEDGE-POOL stays synchronized with codebase
#
# Runs on:
# - Push to main (to catch drift early)
# - Pull requests (to prevent merging drifted docs)
# - Weekly schedule (to detect gradual drift)

name: Documentation Drift Check

on:
  push:
    branches: [main]
    paths:
      - 'pulldb/**'
      - 'schema/**'
      - 'docs/KNOWLEDGE-POOL.*'
  pull_request:
    branches: [main]
    paths:
      - 'pulldb/**'
      - 'schema/**'
      - 'docs/KNOWLEDGE-POOL.*'
  schedule:
    # Run weekly on Sundays at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      severity:
        description: 'Minimum severity to report'
        required: false
        default: 'medium'
        type: choice
        options:
          - critical
          - high
          - medium
          - low
          - info

jobs:
  drift-detection:
    name: Detect Documentation Drift
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run drift detection
        id: drift
        run: |
          SEVERITY="${{ github.event.inputs.severity || 'high' }}"
          echo "Running drift detection with severity: $SEVERITY"
          
          # Run drift detection and capture output
          python -m pulldb.audit --drift --severity "$SEVERITY" --json > drift-report.json 2>&1 || true
          
          # Check for critical/high alerts
          ALERT_COUNT=$(python -c "import json; data=json.load(open('drift-report.json')); print(data.get('summary', {}).get('total_alerts', 0))" 2>/dev/null || echo "0")
          echo "alert_count=$ALERT_COUNT" >> $GITHUB_OUTPUT
          
          # Display human-readable report
          python -m pulldb.audit --drift --severity "$SEVERITY"

      - name: Upload drift report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drift-report
          path: drift-report.json
          retention-days: 30

      - name: Check for critical drift
        if: steps.drift.outputs.alert_count != '0'
        run: |
          echo "⚠️ Documentation drift detected!"
          echo "Found ${{ steps.drift.outputs.alert_count }} alert(s)"
          echo ""
          echo "To fix locally, run:"
          echo "  python -m pulldb.audit --drift --copilot"
          echo ""
          echo "Then update KNOWLEDGE-POOL.md and KNOWLEDGE-POOL.json accordingly."
          
          # Fail on push to main if high/critical drift
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            exit 1
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.drift.outputs.alert_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report;
            try {
              report = JSON.parse(fs.readFileSync('drift-report.json', 'utf8'));
            } catch (e) {
              console.log('Could not parse drift report');
              return;
            }
            
            const alertCount = report.summary?.total_alerts || 0;
            if (alertCount === 0) return;
            
            const body = `## 📚 Documentation Drift Detected

            **${alertCount}** documentation drift alert(s) found.

            <details>
            <summary>View drift summary</summary>

            \`\`\`json
            ${JSON.stringify(report.summary, null, 2)}
            \`\`\`

            </details>

            ### How to fix

            1. Run locally: \`python -m pulldb.audit --drift --copilot\`
            2. Review the suggested changes
            3. Update \`docs/KNOWLEDGE-POOL.md\` and \`docs/KNOWLEDGE-POOL.json\`
            4. Commit the documentation updates

            ---
            *This comment was generated by the documentation drift check workflow.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
