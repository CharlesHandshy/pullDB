# =============================================================================
# pullDB — Docker Compose service definition
# =============================================================================
# Do NOT edit ports or image directly. Set variables in .env.compose.
#
# Active/candidate colors are managed by upgrade.sh using project names:
#   docker compose -p pulldb-blue  --env-file /etc/pulldb/.env.blue  up -d
#   docker compose -p pulldb-green --env-file /etc/pulldb/.env.green up -d
# =============================================================================
services:
  pulldb:
    image: ${PULLDB_IMAGE:?Set PULLDB_IMAGE in .env.compose}
    container_name: ${CONTAINER_NAME:?Set CONTAINER_NAME in .env.compose}
    restart: unless-stopped

    ports:
      # HOST_IP pins the listener to a specific interface (e.g. 10.40.10.117).
      # Defaults to 0.0.0.0 (all interfaces) if not set.
      - "${HOST_IP:-0.0.0.0}:${PORT_WEB:-8000}:8000"
      - "${HOST_IP:-0.0.0.0}:${PORT_API:-8080}:8080"

    # Merge /etc/pulldb/service.env into the container's runtime .env before
    # the entrypoint runs. This injects PULLDB_* and AWS_* vars that supervisord
    # processes source at startup. Only appends if vars aren't already present
    # (idempotent across docker stop/start restarts).
    #
    # WORKAROUND Fix-1: starlette pin — remove once image pins starlette<1.0
    # WORKAROUND Fix-3: service.env merge — remove once entrypoint.sh does this natively
    entrypoint:
      - /bin/bash
      - -c
      - |
        grep -q '^PULLDB_AWS_PROFILE=' /opt/pulldb.service/.env 2>/dev/null || cat /etc/pulldb/service.env >> /opt/pulldb.service/.env
        /opt/pulldb.service/venv/bin/pip install --quiet "starlette==0.46.2"
        exec /entrypoint.sh

    environment:
      # Legacy dump-import upgrade path (fallback). Leave empty normally.
      PULLDB_IMPORT_DUMP: ${PULLDB_IMPORT_DUMP:-}

    volumes:
      # Per-container config directory — set PULLDB_CONFIG_DIR in the env file
      # to an instance-specific path (e.g. /etc/pulldb-prod, /etc/pulldb-blue).
      # The container always sees its config at /etc/pulldb regardless of host path.
      - ${PULLDB_CONFIG_DIR:?Set PULLDB_CONFIG_DIR in .env file (e.g. /etc/pulldb-prod)}:/etc/pulldb:ro
      # Persistent data — scoped to this container's name so multiple containers
      # (blue, green, host service) can share the same /mnt/data parent safely.
      - /mnt/data/${CONTAINER_NAME}:/mnt/data
      # MySQL data directory.
      # Set PULLDB_MYSQL_DATA_DIR to a host path for bind-mount (fresh install,
      # upgrade, and ongoing restarts all use this same path once set).
      # Leave unset only if you want a Docker-managed named volume (not recommended
      # for production — data is harder to inspect and copy).
      - ${PULLDB_MYSQL_DATA_DIR:-pulldb_mysql_data}:/var/lib/mysql

    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 90s

volumes:
  pulldb_mysql_data:
    # Docker-managed named volume — used when PULLDB_MYSQL_DATA_DIR is unset.
    # Prefer setting PULLDB_MYSQL_DATA_DIR=/mnt/data/mysql in production
    # so the data lives at a predictable host path.
    external: false
