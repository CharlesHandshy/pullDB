# =============================================================================
# pullDB — Docker Compose service definition
# =============================================================================
# Do NOT edit ports or image directly. Set variables in .env.compose.
#
# Active/candidate colors are managed by upgrade.sh using project names:
#   docker compose -p pulldb-blue  --env-file /etc/pulldb/.env.blue  up -d
#   docker compose -p pulldb-green --env-file /etc/pulldb/.env.green up -d
# =============================================================================
services:
  pulldb:
    image: ${PULLDB_IMAGE:?Set PULLDB_IMAGE in .env.compose}
    container_name: ${CONTAINER_NAME:?Set CONTAINER_NAME in .env.compose}
    restart: unless-stopped

    ports:
      - "${PORT_WEB:-8000}:8000"
      - "${PORT_API:-8080}:8080"

    environment:
      # Legacy dump-import upgrade path (fallback). Leave empty normally.
      PULLDB_IMPORT_DUMP: ${PULLDB_IMPORT_DUMP:-}

    volumes:
      # Persistent config — survives container replacement
      - /etc/pulldb:/etc/pulldb:ro
      # Persistent data — work dirs, logs
      - /mnt/data:/mnt/data
      # MySQL data directory.
      # Set PULLDB_MYSQL_DATA_DIR to a host path for bind-mount (fresh install,
      # upgrade, and ongoing restarts all use this same path once set).
      # Leave unset only if you want a Docker-managed named volume (not recommended
      # for production — data is harder to inspect and copy).
      - ${PULLDB_MYSQL_DATA_DIR:-pulldb_mysql_data}:/var/lib/mysql

    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 90s

volumes:
  pulldb_mysql_data:
    # Docker-managed named volume — used when PULLDB_MYSQL_DATA_DIR is unset.
    # Prefer setting PULLDB_MYSQL_DATA_DIR=/mnt/data/mysql in production
    # so the data lives at a predictable host path.
    external: false
