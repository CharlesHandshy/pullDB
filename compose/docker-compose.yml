# =============================================================================
# pullDB — Docker Compose service definition
# =============================================================================
# Do NOT edit ports or image directly. Set variables in .env.compose.
#
# Active/candidate colors are managed by upgrade.sh using project names:
#   docker compose -p pulldb-blue  --env-file compose/.env.blue  up -d
#   docker compose -p pulldb-green --env-file compose/.env.green up -d
# =============================================================================
services:
  pulldb:
    image: ${PULLDB_IMAGE:?Set PULLDB_IMAGE in .env.compose}
    container_name: ${CONTAINER_NAME:?Set CONTAINER_NAME in .env.compose}
    restart: unless-stopped

    ports:
      - "${PORT_WEB:-8000}:8000"
      - "${PORT_API:-8080}:8080"

    environment:
      # Upgrade: set to the path of the dump file inside the container.
      # Leave empty for fresh install and restarts.
      PULLDB_IMPORT_DUMP: ${PULLDB_IMPORT_DUMP:-}

    volumes:
      # Persistent config — survives container replacement
      - /etc/pulldb:/etc/pulldb:ro
      # Persistent data — work dirs, logs
      - /mnt/data:/mnt/data
      # MySQL data directory.
      # Fresh install / restart: leave PULLDB_MYSQL_DATA_DIR unset → named volume (Docker managed).
      # Volume-copy upgrade: upgrade.sh sets this to /tmp/pulldb-upgrade/mysql-data (bind mount).
      - ${PULLDB_MYSQL_DATA_DIR:-pulldb_mysql_data}:/var/lib/mysql

volumes:
  pulldb_mysql_data:
    # Docker-managed named volume.  Used on fresh installs and normal restarts.
    # upgrade.sh overrides this with a bind-mount path via PULLDB_MYSQL_DATA_DIR.
    external: false

    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 90s
