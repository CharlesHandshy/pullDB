# ============================================================================
# pullDB Client-Only Package Configuration
# ============================================================================
# Minimal client package containing ONLY CLI code and dependencies.
# Excludes: API server, Web UI, Worker service, binaries, simulation code.
#
# IMPORTANT: This file is a TEMPLATE used by scripts/build_client_deb.sh.
# The build script manually copies only specific CLI files to create a 
# truly minimal wheel. Do not build directly with this file - the CLI
# has dependencies on server modules that won't be satisfied.
#
# To build client package: ./scripts/build_client_deb.sh
# ============================================================================

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pulldb-client"
version = "1.3.0"
description = "pullDB CLI Client - Connect to remote pullDB services"
readme = "packaging/CLIENT-README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
authors = [ { name = "PestRoutes Engineering" } ]
keywords = ["mysql", "restore", "s3", "backup", "dev", "cli"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Operating System :: OS Independent"
]

# Minimal dependencies for CLI client only
dependencies = [
  "click>=8.1.0",
  "requests>=2.32.0"
]

[project.scripts]
pulldb = "pulldb.cli.main:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["pulldb", "pulldb.cli"]
namespaces = false

# No static files, templates, binaries, or web content needed for client
[tool.setuptools.package-data]
pulldb = []

[tool.mypy]
python_version = "3.12"
warn_unused_ignores = true
warn_return_any = true
warn_unused_configs = true
strict_optional = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
show_error_codes = true
warn_redundant_casts = true
warn_unreachable = true
disallow_any_unimported = false
