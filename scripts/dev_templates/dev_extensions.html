    - Dev toolbar (viewport testing, grid overlay, color palette)

<!-- ============================================================
     IFRAME DETECTION - Hide dev toolbar when inside viewport preview
     The CSS hides by default, script removes it if NOT in iframe
     ============================================================ -->
<style id="dev-iframe-hide">
    /* Initially hide all dev elements - script below will remove this if not in iframe */
    .dev-toolbar, .dev-grid-overlay, .dev-palette-popup, .simulation-panel,
    .dev-viewport-preview { display: none !important; }
</style>
<script>
    // If NOT in iframe preview, remove the hiding CSS to show toolbar
    // Run immediately since we're after the style element
    (function() {
        if (!window.location.search.includes('_dev_iframe=1')) {
            // Not in iframe - remove the hiding style to show toolbar
            var hideStyle = document.getElementById('dev-iframe-hide');
            if (hideStyle) {
                hideStyle.parentNode.removeChild(hideStyle);
            }
        }
        // If in iframe, style stays and toolbar remains hidden
    })();
</script>

<!-- ============================================================
     DEV TOOLBAR + SIMULATION PANEL SCRIPTS
     ============================================================ -->
<script>
(function() {
    'use strict';
    
    // ===== Skip initialization if inside iframe preview =====
    if (window.location.search.includes('_dev_iframe=1')) {
        return; // CSS already hides elements, skip all JS setup
    }
    
    // ===== Viewport Info =====
    function updateViewportInfo() {
        const el = document.getElementById('dev-viewport-info');
        if (el) {
            el.textContent = window.innerWidth + ' × ' + window.innerHeight;
        }
    }
    
    window.addEventListener('resize', updateViewportInfo);
    updateViewportInfo();
    
    // ===== Viewport Dropdown =====
    window.toggleViewportDropdown = function() {
        const dropdown = document.getElementById('dev-viewport-dropdown');
        dropdown.classList.toggle('open');
    };
    
    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
        const dropdown = document.getElementById('dev-viewport-dropdown');
        const btn = e.target.closest('.dev-viewport-selector');
        if (!btn && dropdown) {
            dropdown.classList.remove('open');
        }
    });
    
    // ===== Viewport Preview =====
    const viewportSizes = {
        desktop: { width: 1920, height: 1080 },
        laptop: { width: 1366, height: 768 },
        tablet: { width: 768, height: 1024 },
        mobile: { width: 375, height: 667 }
    };
    
    window.setViewportPreview = function(size) {
        const preview = document.getElementById('dev-viewport-preview');
        const frame = document.getElementById('dev-viewport-frame');
        const label = document.getElementById('dev-viewport-preview-label');
        const dropdown = document.getElementById('dev-viewport-dropdown');
        
        dropdown.classList.remove('open');
        
        // Update active state in dropdown
        document.querySelectorAll('.dev-viewport-option').forEach(opt => {
            opt.classList.toggle('active', opt.dataset.viewport === size);
        });
        
        if (size === 'native') {
            closeViewportPreview();
            return;
        }
        
        const dims = viewportSizes[size];
        if (!dims) return;
        
        // Scale to fit available space (leave room for toolbar)
        const availableWidth = window.innerWidth - 80;
        const availableHeight = window.innerHeight - 100;
        
        let scale = Math.min(
            availableWidth / dims.width,
            availableHeight / dims.height,
            1
        );
        
        const scaledWidth = dims.width * scale;
        const scaledHeight = dims.height * scale;
        
        frame.style.width = scaledWidth + 'px';
        frame.style.height = scaledHeight + 'px';
        frame.dataset.currentSize = size;
        
        label.textContent = size.charAt(0).toUpperCase() + size.slice(1) + ' (' + dims.width + '×' + dims.height + ')';
        
        // Create iframe if needed
        let iframe = frame.querySelector('iframe');
        if (!iframe) {
            iframe = document.createElement('iframe');
            // Add _dev_iframe param to prevent nested dev toolbar
            iframe.src = window.location.href + (window.location.href.includes('?') ? '&' : '?') + '_dev_iframe=1';
            frame.appendChild(iframe);
            
            // Add resize handle
            if (!frame.querySelector('.dev-resize-handle')) {
                const handle = document.createElement('div');
                handle.className = 'dev-resize-handle';
                handle.innerHTML = '⋱';
                handle.title = 'Drag to resize';
                frame.appendChild(handle);
                initResizeHandle(handle, frame);
            }
            
            // Add device buttons
            if (!frame.querySelector('.dev-device-buttons')) {
                const buttons = document.createElement('div');
                buttons.className = 'dev-device-buttons';
                buttons.innerHTML = `
                    <button class="dev-device-btn" onclick="resizeViewport(375, 667, 'Mobile')">Mobile</button>
                    <button class="dev-device-btn" onclick="resizeViewport(768, 1024, 'Tablet')">Tablet</button>
                    <button class="dev-device-btn" onclick="resizeViewport(1366, 768, 'Laptop')">Laptop</button>
                    <button class="dev-device-btn" onclick="resizeViewport(1920, 1080, 'Desktop')">Desktop</button>
                `;
                frame.appendChild(buttons);
            }
        }
        
        preview.classList.add('active');
        
        // Dispatch resize event to iframe after it loads
        iframe.onload = function() {
            dispatchResizeToIframe(iframe);
        };
    };
    
    // Resize viewport and dispatch resize event
    window.resizeViewport = function(width, height, label) {
        const frame = document.getElementById('dev-viewport-frame');
        const labelEl = document.getElementById('dev-viewport-preview-label');
        const iframe = frame.querySelector('iframe');
        
        // Scale to fit
        const availableWidth = window.innerWidth - 80;
        const availableHeight = window.innerHeight - 100;
        let scale = Math.min(availableWidth / width, availableHeight / height, 1);
        
        frame.style.width = (width * scale) + 'px';
        frame.style.height = (height * scale) + 'px';
        
        if (labelEl) {
            labelEl.textContent = label + ' (' + width + '×' + height + ')';
        }
        
        // Update active button
        frame.querySelectorAll('.dev-device-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent === label);
        });
        
        // Dispatch resize to iframe
        dispatchResizeToIframe(iframe);
    };
    
    // Dispatch resize event to iframe content
    function dispatchResizeToIframe(iframe) {
        if (iframe && iframe.contentWindow) {
            try {
                // Method 1: Direct event dispatch
                iframe.contentWindow.dispatchEvent(new Event('resize'));
                
                // Method 2: PostMessage for cross-origin compatibility
                iframe.contentWindow.postMessage({ type: 'dev-viewport-resize' }, '*');
            } catch (e) {
                console.log('Could not dispatch resize to iframe:', e);
            }
        }
    }
    
    // Initialize resize handle dragging
    function initResizeHandle(handle, frame) {
        let isResizing = false;
        let startX, startY, startW, startH;
        
        handle.addEventListener('mousedown', function(e) {
            isResizing = true;
            startX = e.clientX;
            startY = e.clientY;
            startW = frame.offsetWidth;
            startH = frame.offsetHeight;
            e.preventDefault();
            document.body.style.cursor = 'nwse-resize';
        });
        
        document.addEventListener('mousemove', function(e) {
            if (!isResizing) return;
            
            const w = Math.max(320, startW + (e.clientX - startX));
            const h = Math.max(200, startH + (e.clientY - startY));
            
            frame.style.width = w + 'px';
            frame.style.height = h + 'px';
            
            // Update label with current size
            const label = document.getElementById('dev-viewport-preview-label');
            if (label) {
                label.textContent = 'Custom (' + Math.round(w) + '×' + Math.round(h) + ')';
            }
        });
        
        document.addEventListener('mouseup', function() {
            if (isResizing) {
                isResizing = false;
                document.body.style.cursor = '';
                
                // Dispatch resize to iframe after drag ends
                const iframe = frame.querySelector('iframe');
                dispatchResizeToIframe(iframe);
            }
        });
    }
    
    window.closeViewportPreview = function() {
        const preview = document.getElementById('dev-viewport-preview');
        const frame = document.getElementById('dev-viewport-frame');
        const iframe = frame.querySelector('iframe');
        const handle = frame.querySelector('.dev-resize-handle');
        const buttons = frame.querySelector('.dev-device-buttons');
        
        if (iframe) iframe.remove();
        if (handle) handle.remove();
        if (buttons) buttons.remove();
        preview.classList.remove('active');
        
        document.querySelectorAll('.dev-viewport-option').forEach(opt => {
            opt.classList.toggle('active', opt.dataset.viewport === 'native');
        });
    };
    // ===== Grid Overlay =====
    window.toggleGrid = function() {
        const overlay = document.getElementById('dev-grid-overlay');
        const btn = document.getElementById('dev-grid-btn');
        overlay.classList.toggle('active');
        btn.classList.toggle('active');
    };
    
    // ===== Color Palette =====
    window.togglePalette = function() {
        const popup = document.getElementById('dev-palette-popup');
        const btn = document.getElementById('dev-palette-btn');
        popup.classList.toggle('open');
        btn.classList.toggle('active');
    };
    
    window.copyColor = function(color) {
        navigator.clipboard.writeText(color).then(function() {
            // Brief visual feedback
            const btn = document.getElementById('dev-palette-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = btn.innerHTML.replace('Colors', 'Copied!');
            setTimeout(function() {
                btn.innerHTML = originalText;
            }, 1000);
        });
    };
    
    // Close palette when clicking outside
    document.addEventListener('click', function(e) {
        const popup = document.getElementById('dev-palette-popup');
        const btn = document.getElementById('dev-palette-btn');
        if (!popup.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
            popup.classList.remove('open');
            btn.classList.remove('active');
        }
    });
    
    // ===== Simulation Panel Functions =====
    window.openSimulationPanel = async function() {
        document.getElementById('simulation-panel').style.display = 'flex';
        await refreshSimulationState();
        await loadScenarios();
        await loadEventHistory();
    };
    
    window.closeSimulationPanel = function() {
        document.getElementById('simulation-panel').style.display = 'none';
    };
    
    window.resetSimulation = async function() {
        const confirmed = await showConfirm('Reset all simulation state? This will clear jobs, events, and S3 fixtures.', {
            title: 'Reset Simulation',
            okText: 'Reset All',
            type: 'danger'
        });
        if (!confirmed) return;
        try {
            const resp = await fetch('/simulation/reset', { method: 'POST' });
            const data = await resp.json();
            showToast(data.message, 'success');
            location.reload();
        } catch (e) {
            showToast('Reset failed: ' + e.message, 'error');
        }
    };
    
    async function refreshSimulationState() {
        try {
            const resp = await fetch('/simulation/status');
            const data = await resp.json();
            document.getElementById('sim-state-info').innerHTML = 
                '<div><strong>Scenario:</strong> ' + (data.current_scenario || 'None') + '</div>' +
                '<div><strong>Jobs:</strong> ' + data.job_count + ' | <strong>Users:</strong> ' + data.user_count + ' | <strong>Hosts:</strong> ' + data.host_count + '</div>' +
                '<div><strong>S3 Buckets:</strong> ' + data.s3_bucket_count + ' | <strong>Events:</strong> ' + data.event_count + '</div>';
        } catch (e) {
            document.getElementById('sim-state-info').textContent = 'Error loading state: ' + e.message;
        }
    }
    
    async function loadScenarios() {
        try {
            const resp = await fetch('/simulation/scenarios');
            const data = await resp.json();
            const select = document.getElementById('sim-scenario-select');
            select.innerHTML = '<option value="">-- Select Scenario --</option>';
            data.scenarios.forEach(function(s) {
                const opt = document.createElement('option');
                opt.value = s.type;
                opt.textContent = s.name + ' - ' + s.description;
                if (s.type === data.current) {
                    opt.selected = true;
                }
                select.appendChild(opt);
            });
        } catch (e) {
            console.error('Failed to load scenarios:', e);
        }
    }
    
    window.activateScenario = async function(scenarioType) {
        if (!scenarioType) return;
        try {
            const resp = await fetch('/simulation/scenarios/activate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ scenario_type: scenarioType })
            });
            const data = await resp.json();
            await refreshSimulationState();
            await loadEventHistory();
        } catch (e) {
            alert('Failed to activate scenario: ' + e.message);
        }
    };
    
    async function loadEventHistory() {
        try {
            const resp = await fetch('/simulation/events?limit=20');
            const data = await resp.json();
            const log = document.getElementById('sim-event-log');
            if (data.events.length === 0) {
                log.innerHTML = '<div style="color: #6b7280;">No events recorded yet</div>';
                return;
            }
            log.innerHTML = data.events.map(function(e) {
                return '<div class="sim-event">' +
                    '<span class="sim-event-time">' + new Date(e.timestamp).toLocaleTimeString() + '</span> ' +
                    '<span class="sim-event-type">' + e.event_type + '</span> ' +
                    '<span class="sim-event-source">[' + e.source + ']</span>' +
                    (e.job_id ? ' <span style="color:#f59e0b">job:' + e.job_id.substring(0,8) + '</span>' : '') +
                '</div>';
            }).join('');
        } catch (e) {
            document.getElementById('sim-event-log').innerHTML = '<div style="color:#ef4444">Error: ' + e.message + '</div>';
        }
    }
    
    // Close panel on escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeSimulationPanel();
            closeViewportPreview();
        }
    });
    
    // ===== Keyboard Shortcut (Ctrl+`) to toggle toolbar =====
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === '`') {
            e.preventDefault();
            const toolbar = document.getElementById('dev-toolbar');
            toolbar.style.display = toolbar.style.display === 'none' ? 'block' : 'none';
        }
    });
})();
</script>
