{% if backups %}
<div class="table-container" style="margin-top: 1rem;">
    <table class="table" style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr>
                <th style="text-align: left; padding: 0.5rem;">Date</th>
                <th style="text-align: left; padding: 0.5rem;">Env</th>
                <th style="text-align: left; padding: 0.5rem;">Size</th>
                <th style="text-align: right; padding: 0.5rem;">Action</th>
            </tr>
        </thead>
        <tbody>
            {% for backup in backups %}
            <tr style="border-top: 1px solid var(--gray-200);">
                <td style="padding: 0.5rem;">{{ backup.timestamp.strftime('%Y-%m-%d %H:%M') }}</td>
                <td style="padding: 0.5rem;">
                    <span class="badge badge-neutral">{{ backup.environment }}</span>
                </td>
                <td style="padding: 0.5rem;">{{ backup.size_mb }} MB</td>
                <td style="padding: 0.5rem; text-align: right;">
                    <button type="button" 
                            class="btn btn-sm btn-secondary"
                            onclick="selectBackup('{{ backup.environment }}')">
                        Select
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="alert alert-warning" style="margin-top: 1rem;">
    No backups found for this customer.
</div>
{% endif %}
