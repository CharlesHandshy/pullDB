{% if results %}
<div class="list-group" style="margin-top: 0.5rem; border: 1px solid var(--gray-200); border-radius: var(--radius-md); overflow: hidden;">
    {% for result in results %}
    <button type="button" 
            class="list-group-item list-group-item-action" 
            style="width: 100%; text-align: left; padding: 0.75rem 1rem; background: white; border: none; border-bottom: 1px solid var(--gray-200); cursor: pointer;"
            onclick="selectCustomer('{{ result.value }}')">
        <div style="font-weight: 500;">{{ result.label }}</div>
        {% if result.sublabel %}
        <div style="font-size: 0.875rem; color: var(--gray-500);">{{ result.sublabel }}</div>
        {% endif %}
    </button>
    {% endfor %}
</div>
{% else %}
<div class="text-gray-500" style="padding: 0.5rem;">No customers found</div>
{% endif %}
