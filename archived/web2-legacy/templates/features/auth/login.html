{% extends "base.html" %}

{% block title %}Login - pullDB{% endblock %}

{% block sidebar %}
<!-- No sidebar on login page -->
{% endblock %}

{% block header_actions %}
<!-- No header actions on login page -->
{% endblock %}

{% block content %}
<div class="login-container" style="display: flex; justify-content: center; align-items: center; height: 100%; padding: 2rem;">
    <div class="card" style="width: 100%; max-width: 400px; padding: 2rem;">
        <h2 style="margin-top: 0; margin-bottom: 1.5rem; text-align: center;">Login to pullDB</h2>
        
        {% if error %}
        <div class="alert alert-error" style="margin-bottom: 1.5rem;">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="post" action="/web/auth/login">
            <div class="form-group" style="margin-bottom: 1rem;">
                <label for="username" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Username</label>
                <input type="text" id="username" name="username" class="input" required autofocus style="width: 100%;">
            </div>
            
            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
                <input type="password" id="password" name="password" class="input" required style="width: 100%;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
