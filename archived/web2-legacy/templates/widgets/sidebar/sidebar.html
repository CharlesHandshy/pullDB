{% if user %}
    <!-- Dashboard -->
    <a href="/web/dashboard" class="sidebar-item {% if active_nav == 'dashboard' %}active{% endif %}">
        <div class="sidebar-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
        </div>
        <span class="sidebar-label">Dashboard</span>
    </a>

    <!-- Jobs -->
    <a href="/web/jobs" class="sidebar-item {% if active_nav == 'jobs' %}active{% endif %}">
        <div class="sidebar-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
        </div>
        <span class="sidebar-label">Jobs</span>
    </a>

    <!-- Restore -->
    <a href="/web/restore" class="sidebar-item {% if active_nav == 'restore' %}active{% endif %}">
        <div class="sidebar-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="1 4 1 10 7 10"></polyline>
                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
            </svg>
        </div>
        <span class="sidebar-label">Restore</span>
    </a>

    {% if user.role.value in ['manager', 'admin'] %}
    <!-- Manager -->
    <a href="/web/manager" class="sidebar-item {% if active_nav == 'manager' %}active{% endif %}">
        <div class="sidebar-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
        </div>
        <span class="sidebar-label">Manager</span>
    </a>
    {% endif %}

    {% if user.role.value == 'admin' %}
    <!-- Admin -->
    <a href="/web/admin" class="sidebar-item {% if request.url.path.startswith('/web/admin') %}active{% endif %}">
        <div class="sidebar-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20h9"></path>
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
            </svg>
        </div>
        <span class="sidebar-label">Admin</span>
    </a>
    {% endif %}
    
    <div style="margin-top: auto; border-top: 1px solid var(--gray-200); padding-top: 0.5rem;">
        <a href="/web/auth/logout" class="sidebar-item">
            <div class="sidebar-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </div>
            <span class="sidebar-label">Logout</span>
        </a>
    </div>
{% else %}
    <a href="/web/auth/login" class="sidebar-item {% if request.url.path.startswith('/web/auth/login') %}active{% endif %}">
        <div class="sidebar-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                <polyline points="10 17 15 12 10 7"></polyline>
                <line x1="15" y1="12" x2="3" y2="12"></line>
            </svg>
        </div>
        <span class="sidebar-label">Login</span>
    </a>
{% endif %}
