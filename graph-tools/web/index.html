<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pullDB Visualization Tools</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background-color: #252526;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border: 1px solid #333;
        }
        h1 {
            margin-top: 0;
            color: #569cd6;
            margin-bottom: 30px;
        }
        .menu {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .menu-item {
            display: block;
            padding: 15px 30px;
            background-color: #3c3c3c;
            color: #d4d4d4;
            text-decoration: none;
            border-radius: 4px;
            font-size: 18px;
            transition: background-color 0.2s, transform 0.1s;
            border: 1px solid #444;
        }
        .menu-item:hover {
            background-color: #505050;
            transform: translateY(-2px);
            border-color: #569cd6;
        }
        .menu-item span {
            display: block;
            font-size: 14px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>pullDB Visualizations</h1>
        <div class="menu">
            <a href="code.html" class="menu-item">
                Code Structure Graph
                <span>Interactive 2D visualization of Python modules and classes</span>
            </a>
            <a href="flow.html" class="menu-item">
                Logical Flow Graph
                <span>Interactive 2D Flow Chart with Drill-down</span>
            </a>
        </div>
    </div>
</body>
</html>
